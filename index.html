<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #111;
        }

        #app {
            position: fixed;
            inset: 0;
            display: flex;
        }

        #viewport {
            flex: 1;
            min-width: 0;
            min-height: 0;
        }

        #notifications {
            position: fixed;
            top: 16px;
            left: 16px;

            display: flex;
            flex-direction: column;
            gap: 8px;

            z-index: 1000;
            pointer-events: none;
        }

        .notification {
            padding: 10px 14px;

            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #444;

            color: #ffcc66;
            font-size: 14px;

            border-radius: 4px;
        }

        #ui {
            width: 320px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            background: #0f0f0f;
        }

        #login {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #333;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            color: #ddd;
            font-size: 14px;
        }

        #chat > div {
            margin-bottom: 4px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        #chatInput {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #333;
            background: #0f0f0f;
        }

        input {
            flex: 1;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            outline: none;
        }

        button {
            padding: 8px 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>
<div id="app">
    <div id="viewport"></div>
    <div id="notifications"></div>

    <div id="ui">
        <div id="login">
            <label for="nickname"></label><input id="nickname" placeholder="nickname" />
            <button id="loginBtn">login</button>
        </div>


        <div id="chat"></div>

        <div id="chatInput">
            <label for="messageInput"></label><input id="messageInput" placeholder="message" />
            <button id="sendBtn">send</button>
        </div>

    </div>
</div>

<script type="module" src="/game/main.js"></script>
</body>
</html>
